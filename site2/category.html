<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading…</title>

  <link rel="preconnect" href="https://fonts.bunny.net">
  <link rel="stylesheet" href="https://fonts.bunny.net/css?family=fraunces:400,500,600|dm-sans:400,500,700|jetbrains-mono:400,500&display=swap">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <div class="shell shell--blog">
    <div id="sidebar-slot"></div>

    <main class="main">
      <a class="back-link back-link--top" href="blog.html">← Все категории</a>

      <header class="cat-header">
        <h1 class="cat-header__title" id="cat-title"></h1>
        <p class="cat-header__count" id="cat-count"></p>
        <p class="cat-header__desc" id="cat-desc"></p>
      </header>

      <div class="cat-controls">
        <div class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" class="search-input" placeholder="Поиск по статьям, описанию и тегам…" autocomplete="off" />
        </div>
        <div class="tag-filter" id="tag-filter"></div>
      </div>

      <div id="article-groups"></div>
    </main>
  </div>

  <script type="module" src="assets/js/category.js"></script>
</body>
</html>
